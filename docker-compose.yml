version: "3.9"

services:

  studentcare-api:
    build: .
    container_name: studentcare-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

  studentcare-frontend:
    build: .
    container_name: studentcare-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: streamlit run src/frontend/app.py --server.port 8501 --server.address 0.0.0.0